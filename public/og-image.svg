<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb"/>
      <stop offset="50%" style="stop-color:#9ca3af"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative particles -->
  <circle cx="100" cy="100" r="2" fill="#00d2ff" opacity="0.3"/>
  <circle cx="200" cy="400" r="1.5" fill="#00d2ff" opacity="0.2"/>
  <circle cx="1000" cy="150" r="2" fill="#00d2ff" opacity="0.3"/>
  <circle cx="1100" cy="500" r="1.5" fill="#00d2ff" opacity="0.2"/>
  <circle cx="600" cy="50" r="1" fill="#00d2ff" opacity="0.4"/>
  <circle cx="400" cy="580" r="1.5" fill="#00d2ff" opacity="0.3"/>
  <circle cx="800" cy="600" r="1" fill="#00d2ff" opacity="0.2"/>
  
  <!-- NeX text -->
  <text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#darkGrad)" letter-spacing="4">
    NeX
  </text>
  
  <!-- Pay text with glow -->
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#00d2ff" letter-spacing="4" filter="url(#glow)">
    Pay
  </text>
  
  <!-- Tagline -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6b7280" letter-spacing="10">
    INTERNATIONAL FINANCIAL ECOSYSTEM
  </text>
  
  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">
    nexpay.nextrustx.com
  </text>
</svg>
