<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <!-- Glow filter for neon effect -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Metallic gradient for "Dark" -->
    <linearGradient id="metallicGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ca3af"/>
      <stop offset="50%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#4b5563"/>
    </linearGradient>
    
    <!-- Cyan gradient for "Pay" -->
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#00a8cc"/>
    </linearGradient>
    
    <!-- Glow animation -->
    <animate id="glowPulse" attributeName="stdDeviation" values="2;4;2" dur="2s" repeatCount="indefinite"/>
  </defs>
  
  <!-- Hooded Figure Icon -->
  <g transform="translate(10, 10)" filter="url(#neonGlow)">
    <!-- Hood outline -->
    <path d="M25 70 Q15 55 20 35 Q25 15 50 10 Q75 15 80 35 Q85 55 75 70 Q60 85 50 85 Q40 85 25 70 Z" 
          fill="#1a1a1a" 
          stroke="#00d2ff" 
          stroke-width="2"/>
    
    <!-- Hood inner shadow -->
    <path d="M30 65 Q22 52 26 38 Q30 22 50 18 Q70 22 74 38 Q78 52 70 65 Q58 78 50 78 Q42 78 30 65 Z" 
          fill="#0a0a0a"/>
    
    <!-- Eyes with glow -->
    <ellipse cx="38" cy="45" rx="8" ry="3" fill="#00d2ff" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="62" cy="45" rx="8" ry="3" fill="#00d2ff" filter="url(#neonGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Eye shine -->
    <ellipse cx="40" cy="44" rx="2" ry="1" fill="#ffffff" opacity="0.8"/>
    <ellipse cx="64" cy="44" rx="2" ry="1" fill="#ffffff" opacity="0.8"/>
    
    <!-- Padlock icon -->
    <g transform="translate(85, 25)">
      <!-- Lock body -->
      <rect x="0" y="20" width="25" height="20" rx="3" fill="none" stroke="#00d2ff" stroke-width="2"/>
      <!-- Lock shackle -->
      <path d="M5 20 L5 12 Q5 5 12.5 5 Q20 5 20 12 L20 20" fill="none" stroke="#00d2ff" stroke-width="2"/>
      <!-- Keyhole -->
      <circle cx="12.5" cy="28" r="3" fill="#00d2ff"/>
      <rect x="11" y="28" width="3" height="6" fill="#00d2ff"/>
    </g>
  </g>
  
  <!-- DarkPay Text -->
  <g transform="translate(140, 30)">
    <!-- "Dark" in metallic gray -->
    <text x="0" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#metallicGray)">
      Dark
    </text>
    
    <!-- "Pay" in cyan with glow -->
    <text x="120" y="55" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="bold" fill="url(#cyanGradient)" filter="url(#neonGlow)">
      Pay
    </text>
  </g>
  
  <!-- Animated scanline effect -->
  <rect x="0" y="0" width="400" height="2" fill="#00d2ff" opacity="0.1">
    <animate attributeName="y" values="0;120;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
